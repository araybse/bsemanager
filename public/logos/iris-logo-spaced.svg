  <!-- IRIS letters - spaced across the width -->
  <!-- I -->
  <text x="75" y="48" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#1e40af">I</text>
  
  <!-- R -->
  <text x="125" y="48" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#1e40af">R</text>
  
  <!-- I -->
  <text x="175" y="48" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#1e40af">I</text>
  
  <!-- S -->

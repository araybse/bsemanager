    <circle cx="51" cy="15" r="2.5" fill="#1e40af"/>
    <circle cx="54" cy="30" r="2.5" fill="#1e40af"/>
    <circle cx="51" cy="45" r="2.5" fill="#1e40af"/>
    <circle cx="30" cy="54" r="2.5" fill="#1e40af"/>

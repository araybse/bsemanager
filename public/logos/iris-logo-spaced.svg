    <!-- Inner geometric pattern -->
    <circle cx="30" cy="30" r="4" fill="#1e40af"/>
    
    <!-- Radial lines -->
    <line x1="30" y1="30" x2="30" y2="6" stroke="#1e40af" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="51" y2="15" stroke="#1e40af" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="54" y2="30" stroke="#1e40af" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="51" y2="45" stroke="#1e40af" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="30" y2="54" stroke="#1e40af" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="9" y2="45" stroke="#1e40af" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="6" y2="30" stroke="#1e40af" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="9" y2="15" stroke="#1e40af" stroke-width="1.5"/>
    
    <!-- Outer dots -->

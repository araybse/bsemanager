<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      padding: 40px; 
      background: #f8fafc;
    }
    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
      background: white; 
      padding: 40px; 
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h2 { 
      color: #1e293b; 
      margin: 40px 0 20px 0; 
      font-size: 20px;
    }
    .logo-box { 
      padding: 40px; 
      border: 2px solid #e2e8f0; 
      border-radius: 8px; 
      margin: 20px 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dark { background: #0f172a; }
    img { max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="color: #1e40af; margin-bottom: 10px;">IRIS Logo Suite</h1>
    <p style="color: #64748b; margin-bottom: 40px;">Integrated Resource Intelligence System</p>
    
    <h2>Icon Only</h2>
    <div class="logo-box">
      <img src="iris-icon.svg" style="width: 120px;">
    </div>
    
    <h2>Horizontal Lockup (Login Page, Header)</h2>
    <div class="logo-box">
      <img src="iris-logo-horizontal.svg" style="width: 280px;">
    </div>
    
    <h2>Stacked Version (Loading Screen)</h2>
    <div class="logo-box">
      <img src="iris-logo-stacked.svg" style="width: 160px;">
    </div>
    
    <h2>Icon on Dark Background</h2>
    <div class="logo-box dark">
      <img src="iris-icon.svg" style="width: 120px;">
    </div>
  </div>
</body>
</html>
